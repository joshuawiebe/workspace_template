name: Nightly Submodule Update

# Run every night at 02:00 Europe/Berlin (approx 01:00 UTC)
on:
  schedule:
    - cron: '0 1 * * *' # 02:00 CET / 01:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository and submodules using SSH
      - name: Checkout repository (SSH)
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}
          ssh-user: git
          submodules: recursive
          fetch-depth: 1
          persist-credentials: false
          clean: true
          set-safe-directory: true

      # Setup SSH for update script (needed since checkout doesn't persist credentials)
      - name: Setup SSH for update script
        shell: bash
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/id_ed25519 <<'SSHKEY'
          ${{ secrets.SSH_PRIVATE_KEY }}
          SSHKEY
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null

      # Configure Git identity and signing
      - name: Configure Git identity and signing
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.signingkey ~/.ssh/id_ed25519
          git config --global commit.gpgsign true
          git config --global gpg.format ssh

      # Run nightly update script
      - name: Run update script
        run: |
          chmod +x .automations/update.sh
          ./.automations/update.sh

      # Generate summary output
      - name: Summary
        if: always()
        run: |
          echo "## Nightly Update - $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "Update script executed" >> $GITHUB_STEP_SUMMARY
          echo "Submodules are updated and committed/pushed by .automations/update.sh"
